
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Order 9898</title>
    </head>
    <body>
        <h1>Order 9898</h1>
        <p><strong>Item:</strong> </p>
        <p><strong>Quantity:</strong> </p>
        <p><strong>Price:</strong> </p>
        
        <p><strong>Mark as Delivered:</strong></p>
        <input type="checkbox" id="deliveryCheckbox" onchange="updateDeliveryStatus()">
        <label for="deliveryCheckbox">Delivered</label>
        
        <script>
            function updateDeliveryStatus() {
                const isChecked = document.getElementById('deliveryCheckbox').checked;
                fetch('https://script.google.com/macros/s/YOUR_SCRIPT_URL/exec', {
                    method: 'POST',
                    body: JSON.stringify({ orderNumber: 9898, delivered: isChecked }),
                    headers: { 'Content-Type': 'application/json' }
                }).then(response => response.json()).then(data => {
                    alert('Delivery status updated!');
                }).catch(error => {
                    alert('Error updating status: ' + error);
                });
            }
        </script>
    </body>
    </html>
