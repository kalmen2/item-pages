<!DOCTYPE html>
<html>

<head>
    <title>Item Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Order Details -->
        <div class="order-details">
            <h1>Item <span id="itemId"></span>: <span id="itemName"></span></h1>
            <p>
                <span class="label">Order Date:</span>
                <span id="orderDate" class="value"></span>
            </p>
            <p>
                <span class="label">Quantity:</span>
                <span id="quantity" class="value"></span>
            </p>
            <p>
                <span class="label">Store:</span>
                <span id="store" class="value"></span>
            </p>
            <p>
                <span class="label">Cost:</span>
                <span id="cost" class="value"></span>
            </p>
            <p>
                <span class="label">Payback:</span>
                <span id="payback" class="value"></span>
            </p>
        </div>

        <!-- First Select Container -->
        <div class="select-container">
            <input type="number" id="quantityInput1" name="quantity" placeholder="Enter number" />
            <select id="region1" name="region">
                <option value="BFMR">BFMR</option>
                <option value="USA" selected>USA</option>
            </select>
        </div>

        <!-- Second Select Container -->
        <div class="select-container">
            <input type="number" id="quantityInput2" name="quantity" placeholder="Enter number" />
            <select id="region2" name="region">
                <option value="BFMR">BFMR</option>
                <option value="USA" selected>USA</option>
            </select>
        </div>
    </div>

    <div class="footer">
        <p>This page is automatically generated. More details will be added soon!</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
